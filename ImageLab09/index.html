<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/@c-frame/aframe-particle-system-component@1.2.x/dist/aframe-particle-system-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 2.5 -5" radius="1"  color="#FFFFFF"></a-sphere>
      <a-sphere position="0 1 -5" radius="1.25" color="#FFFFFF"></a-sphere>
      <a-sphere position="0 3.7 -5" radius="0.65"  color="#FFFFFF"></a-sphere>
      <a-sphere position=".25 3.9 -4.42" radius="0.05"  color="#000000"></a-sphere>
      <a-sphere position="-.25 3.9 -4.42" radius="0.05"  color="#000000"></a-sphere>
      <a-cone position="0 3.75 -4" rotation="-90 0 0" color="#F54927" radius-bottom=".01" radius-top="0.1" height=".75"></a-cone>
      <a-plane position="0 .5 -5" rotation="-90 0 0" width="100" height="100" color="#FFFFFF"></a-plane>
      <a-cylinder position="-.35 2.335 -2.5" color="#6F4E37" rotation="108 6.5 0"segments-height="3" radius=".05" height="4.8"></a-cylinder>
      <a-cylinder position=".35 2.325 -2.5" color="#6F4E37" rotation="108 -6.5 0"segments-height="3" radius=".05" height="4.8"></a-cylinder>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: checkerboard; dressingAmount: 300"></a-entity>
      <a-entity particle-system="preset: snow" position="0 0 -10"></a-entity>
    </a-scene>
  </body>
</html>
